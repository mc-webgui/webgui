name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-main
  cancel-in-progress: true

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: meta
        run: |
          modv=$(grep '^mod_version=' gradle.properties | cut -d= -f2- | tr -d '\r ')
          echo "version=${modv}" >> "$GITHUB_OUTPUT"
          echo "tag=v${modv}" >> "$GITHUB_OUTPUT"

      - name: Skip if tag already exists
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.meta.outputs.version }}" | grep -q .; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.meta.outputs.version }} already exists — skipping release."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Java
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle

      - name: Build all versions
        if: steps.check.outputs.skip == 'false'
        run: |
          chmod +x gradlew
          ./gradlew build --no-daemon
        env:
          GRADLE_OPTS: -Xmx2g

      # Gate distribution on the full launch/server verification: nothing is
      # tagged or shipped unless the mod actually boots.
      - name: Launch test (Fabric)
        if: steps.check.outputs.skip == 'false'
        run: ./gradlew :1.21.11-fabric:launchTest --no-daemon --stacktrace

      - name: Server smoke test (Fabric)
        if: steps.check.outputs.skip == 'false'
        run: bash .github/scripts/server-smoke-test.sh :1.21.11-fabric 600

      - name: Server smoke test (NeoForge)
        if: steps.check.outputs.skip == 'false'
        run: bash .github/scripts/server-smoke-test.sh :1.21.11-neoforge 600

      # Publish each jar as its own Modrinth version (one per MC version + loader)
      # BEFORE creating the git tag, so a failed upload doesn't leave a tag that
      # would make the whole release skip on re-run.
      - name: Publish 1.20.1 Fabric to Modrinth
        if: steps.check.outputs.skip == 'false'
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: tDw1xQja
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          modrinth-featured: false
          name: WebGUI ${{ steps.meta.outputs.version }} (1.20.1 Fabric)
          version: ${{ steps.meta.outputs.version }}+mc1.20.1-fabric
          version-type: release
          loaders: fabric
          game-versions: '1.20.1'
          changelog-file: CHANGELOG.md
          files: |
            versions/1.20.1-fabric/build/libs/*.jar
            !versions/1.20.1-fabric/build/libs/*-dev.jar
            !versions/1.20.1-fabric/build/libs/*-sources.jar

      - name: Publish 1.21.1 Fabric to Modrinth
        if: steps.check.outputs.skip == 'false'
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: tDw1xQja
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          modrinth-featured: false
          name: WebGUI ${{ steps.meta.outputs.version }} (1.21.1 Fabric)
          version: ${{ steps.meta.outputs.version }}+mc1.21.1-fabric
          version-type: release
          loaders: fabric
          game-versions: '1.21.1'
          changelog-file: CHANGELOG.md
          files: |
            versions/1.21.1-fabric/build/libs/*.jar
            !versions/1.21.1-fabric/build/libs/*-dev.jar
            !versions/1.21.1-fabric/build/libs/*-sources.jar

      - name: Publish 1.21.11 Fabric to Modrinth
        if: steps.check.outputs.skip == 'false'
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: tDw1xQja
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          modrinth-featured: false
          name: WebGUI ${{ steps.meta.outputs.version }} (1.21.11 Fabric)
          version: ${{ steps.meta.outputs.version }}+mc1.21.11-fabric
          version-type: release
          loaders: fabric
          game-versions: '1.21.11'
          changelog-file: CHANGELOG.md
          files: |
            versions/1.21.11-fabric/build/libs/*.jar
            !versions/1.21.11-fabric/build/libs/*-dev.jar
            !versions/1.21.11-fabric/build/libs/*-sources.jar

      - name: Publish 1.21.1 NeoForge to Modrinth
        if: steps.check.outputs.skip == 'false'
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: tDw1xQja
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          modrinth-featured: false
          name: WebGUI ${{ steps.meta.outputs.version }} (1.21.1 NeoForge)
          version: ${{ steps.meta.outputs.version }}+mc1.21.1-neoforge
          version-type: release
          loaders: neoforge
          game-versions: '1.21.1'
          changelog-file: CHANGELOG.md
          files: |
            versions/1.21.1-neoforge/build/libs/*.jar
            !versions/1.21.1-neoforge/build/libs/*-dev.jar
            !versions/1.21.1-neoforge/build/libs/*-sources.jar

      - name: Publish 1.21.11 NeoForge to Modrinth
        if: steps.check.outputs.skip == 'false'
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: tDw1xQja
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          modrinth-featured: false
          name: WebGUI ${{ steps.meta.outputs.version }} (1.21.11 NeoForge)
          version: ${{ steps.meta.outputs.version }}+mc1.21.11-neoforge
          version-type: release
          loaders: neoforge
          game-versions: '1.21.11'
          changelog-file: CHANGELOG.md
          files: |
            versions/1.21.11-neoforge/build/libs/*.jar
            !versions/1.21.11-neoforge/build/libs/*-dev.jar
            !versions/1.21.11-neoforge/build/libs/*-sources.jar

      - name: Create GitHub Release
        if: steps.check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: v${{ steps.meta.outputs.version }}
          files: |
            versions/*/build/libs/*.jar
            !versions/*/build/libs/*-dev.jar
          fail_on_unmatched_files: false
