name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-main
  cancel-in-progress: true

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: meta
        run: |
          modv=$(grep '^mod_version=' gradle.properties | cut -d= -f2- | tr -d '\r ')
          echo "version=${modv}" >> "$GITHUB_OUTPUT"
          echo "tag=v${modv}" >> "$GITHUB_OUTPUT"

      - name: Skip if tag already exists
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.meta.outputs.version }}" | grep -q .; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.meta.outputs.version }} already exists — skipping release."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Java
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle

      - name: Build all versions
        if: steps.check.outputs.skip == 'false'
        run: |
          chmod +x gradlew
          ./gradlew build --no-daemon
        env:
          GRADLE_OPTS: -Xmx2g

      - name: Create GitHub Release
        if: steps.check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: v${{ steps.meta.outputs.version }}
          files: |
            versions/*/build/libs/*.jar
            !versions/*/build/libs/*-dev.jar
          fail_on_unmatched_files: false
