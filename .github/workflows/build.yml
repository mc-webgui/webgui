name: Build

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build all versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build --stacktrace

      # Boots Minecraft with the mod (fabric-loader-junit) and asserts it loads.
      # Kept separate from `build` so releases never depend on game assets.
      - name: Launch test (Fabric)
        run: ./gradlew :1.21.11-fabric:launchTest --stacktrace

      # Smoke test: boot a REAL dedicated server (headless) and assert it reaches
      # "Done" with the mod initialized. Guards that the mod actually loads on a
      # dedicated server on both loaders.
      - name: Server smoke test (Fabric)
        run: bash .github/scripts/server-smoke-test.sh :1.21.11-fabric 600

      - name: Server smoke test (NeoForge)
        run: bash .github/scripts/server-smoke-test.sh :1.21.11-neoforge 600

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: 'versions/**/build/libs/*.jar'
          if-no-files-found: error
          retention-days: 30
