name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 'Java ${{ matrix.java }} · MC ${{ matrix.mc }}'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ '21' ]
        mc: [ '1.21.11' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build --no-daemon -Pmc=${{ matrix.mc }}
        env:
          GRADLE_OPTS: -Xmx2g

      - name: Resolve artifact name
        id: jarname
        if: success()
        run: |
          an=$(grep '^archives_base_name=' gradle.properties | cut -d= -f2- | tr -d '\r ')
          modv=$(grep '^mod_version=' gradle.properties | cut -d= -f2- | tr -d '\r ')
          mcv=$(grep '^minecraft_version=' "versions/${{ matrix.mc }}.properties" | cut -d= -f2- | tr -d '\r ')
          echo "name=${an}-${modv}+mc${mcv}" >> "$GITHUB_OUTPUT"

      - name: Upload JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.jarname.outputs.name }}
          path: build/libs/${{ steps.jarname.outputs.name }}.jar
          if-no-files-found: error
          retention-days: 30

      - name: Upload sources JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.jarname.outputs.name }}-sources
          path: build/libs/${{ steps.jarname.outputs.name }}-sources.jar
          if-no-files-found: warn
          retention-days: 30
